<div class="p-6 flex flex-col items-center gap-4 bg-white dark:bg-[#1e2130] rounded-lg shadow-lg ring-1 ring-gray-200 dark:ring-gray-700">
    <h2 class="text-lg text-black dark:text-white font-semibold">
       Cerrar sesion 
     </h2>
    <p class="text-sm text-gray-400">
      ¿Estás seguro de que deseas cerrar sesión?
    </p>

    <div class="flex flex-col-2 gap-4 w-full mt-2">
        <button (click)="cancelar()"
        class="w-full bg-gray-200 h-10 dark:bg-gray-700 text-gray-800 dark:text-gray-300 font-semibold px-4 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition duration-300">
        Cancelar
        </button>

        <button (click)="confirmar()"
        class="w-full bg-red-500 h-10 hover:bg-red-600 text-white font-semibold px-4 py-2 rounded-lg transition duration-300">
        cerrar sesion
        </button>

    </div>

</div>
