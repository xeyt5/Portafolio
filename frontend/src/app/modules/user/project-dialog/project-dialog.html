<div class="bg-white dark:bg-zinc-900 text-black dark:text-white 
p-4 sm:p-6 md:p-8 
rounded-2xl shadow-2xl 
max-w-2xl w-full mx-auto">

  <!-- Título -->
  <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-4 sm:mb-6 text-center">
    {{ data.title }}
  </h2>

  <!-- Carrusel -->
  <div class="relative mb-4 sm:mb-6">

    <!-- Imagen -->
    <img
      [src]="data.images[currentIndex]"
      class="w-full h-52 sm:h-64 md:h-80 object-cover rounded-xl transition duration-300"
    >

    <!-- Botón izquierda -->
    <button
      (click)="prev()"
      class="absolute left-2 sm:left-3 top-1/2 -translate-y-1/2 
      bg-black/60 hover:bg-black text-white 
      px-2 sm:px-4 py-1 sm:py-2 
      text-sm sm:text-base 
      rounded-full transition">
      ←
    </button>

    <!-- Botón derecha -->
    <button
      (click)="next()"
      class="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 
      bg-black/60 hover:bg-black text-white 
      px-2 sm:px-4 py-1 sm:py-2 
      text-sm sm:text-base 
      rounded-full transition">
      →
    </button>

  </div>

  <!-- Indicadores -->
  <div class="flex justify-center gap-2 mb-4 sm:mb-6">
    @for (img of data.images; track $index) {
      <div
        class="w-2 h-2 sm:w-3 sm:h-3 rounded-full transition"
        [class.bg-blue-500]="$index === currentIndex"
        [class.bg-gray-400]="$index !== currentIndex">
      </div>
    }
  </div>

  <!-- Descripción -->
  <p class="text-sm sm:text-base md:text-lg text-gray-700 dark:text-gray-300 mb-4 sm:mb-6 text-center leading-relaxed">
    {{ data.description }}
  </p>

  <!-- Botones -->
  <div class="flex flex-col sm:flex-row gap-3">

    <a
      [href]="data.link"
      target="_blank"
      class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white 
      text-sm sm:text-lg font-medium px-4 py-2 sm:px-6 sm:py-3 rounded-full transition">
      Ver proyecto
    </a>

    <button
      (click)="close()"
      class="flex-1 text-center bg-gray-300 hover:bg-gray-400 text-gray-800 
      text-sm sm:text-lg font-medium px-4 py-2 sm:px-6 sm:py-3 rounded-full transition">
      Cerrar
    </button>

  </div>

</div>
