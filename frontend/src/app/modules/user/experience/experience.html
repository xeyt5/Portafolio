<section class="px-4 py-16">
  <div class="max-w-2xl mx-auto">

    <div class="text-center mb-14">
      <h2 class="text-4xl sm:text-5xl font-bold tracking-tight text-gray-900 dark:text-white">
        Experiencia & Trayectoria
      </h2>
      <p class="mt-2 text-xs uppercase tracking-widest text-gray-400">Historial profesional</p>
    </div>


    <div class="relative pl-8 sm:pl-14">
      <div class="absolute left-0 top-2 bottom-2 w-px bg-gray-200 dark:bg-gray-700"></div>

      <div *ngFor="let exp of experiences" class="relative mb-10 group">

        <div class="absolute -left-8 sm:-left-14 top-2.5 w-2.5 h-2.5 rounded-full
                    bg-white dark:bg-gray-900
                    border-2 border-gray-300 dark:border-gray-600
                    translate-x-[-4px]
                    group-hover:border-blue-400 dark:group-hover:border-purple-500
                    transition-colors duration-300"></div>

        <div class="bg-white dark:bg-[#1e2130]
                    border border-gray-200 dark:border-gray-700
                    shadow rounded-2xl px-5 py-5
                    transition duration-300
                    group-hover:shadow-xl
                    group-hover:translate-x-1
                    group-hover:bg-slate-50 dark:group-hover:bg-[#1e2130]
                    group-hover:ring-2 group-hover:ring-blue-400 dark:group-hover:ring-purple-500">

          <div class="flex flex-wrap items-start gap-2 mb-1">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white leading-snug">
              {{ exp.title }}
            </h3>
            <span class="mt-0.5 text-[11px] font-medium
                         text-gray-500 dark:text-gray-400
                         bg-gray-100 dark:bg-gray-800
                         border border-gray-200 dark:border-gray-700
                         rounded-full px-2.5 py-0.5 whitespace-nowrap">
              {{ exp.duration }}
            </span>
          </div>

          <p class="text-sm font-medium text-gray-400 dark:text-gray-500 mb-3">
            {{ exp.company }}
          </p>

          <p class="text-sm text-black dark:text-white leading-relaxed">
            {{ exp.description }}
          </p>

        </div>
      </div>
    </div>
  </div>
</section>
