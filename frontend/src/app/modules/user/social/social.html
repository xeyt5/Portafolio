<h1 class="dark:text-white text-black font-bold text-4xl text-center py-6">
  My Videos
</h1>

<div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 p-4">

  @for (video of videos; track video) {

    <div 
      class="bg-white dark:bg-gray-900 rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden cursor-pointer"
      (click)="goToVideo(video.videoId)"
    >

      <!-- Thumbnail -->
      <img 
        [src]="'https://img.youtube.com/vi/' + video.videoId + '/hqdefault.jpg'"
        class="w-full h-48 object-cover">

      <!-- Info -->
      <div class="p-4">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-white">
          {{ video.title }}
        </h2>

        <p class="text-gray-500 text-sm mt-2">
          {{ video.description }}
        </p>
      </div>

    </div>

  }

</div>
